<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dynamic Values</title>
    <style>
        body{ background: #0a0a0a; color: #00ff00; font-family: monospace; padding: 20px; }
        .card{ background: #1a1a1a; border: 1px solid #00ff00; border-radius: 10px; padding: 20px; margin: 10px; text-align: center; }
        .value{ font-size: 2em; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Bynamic Values System v4.0</h1>
    <div id="data"></div>
    <script>
        function loadData() {
            fetch('/api.php')
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('data');
                    container.innerHTML = '';
                    for (const [key, value] of Object.entries(data)) {
                        container.innerHTML += `
                            <div class="card">
                                <strong>${key}</strong><br>
                                <span class="value">${typeof value === 'object' ? JSON.stringify(value) : value}</span>
                            </div>
                        ;
                    }
                });
        }
        loadData();
        setInterval(loadData, 3000);
    </script>
</body>
</html>
