<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Values System - Enterprise Dashboard Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #00ff00;
            min-height: 100vh;
            padding: 20px;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100vh;
            background: rgba(10, 10, 10, 0.95);
            border-right: 1px solid #00ff00;
            padding: 20px;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar h3 {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #00ff00;
        }

        .sidebar a {
            display: block;
            color: #00ff00;
            text-decoration: none;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .sidebar a:hover {
            background: rgba(0, 255, 0, 0.1);
        }

        .menu-btn {
            position: fixed;
            left: 20px;
            top: 20px;
            background: #00ff00;
            color: #0a0a0a;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 1001;
            font-weight: bold;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding-left: 20px;
        }

        /* Dark/Light mode toggle */
        .theme-toggle {
            position: fixed;
            right: 20px;
            top: 20px;
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid #00ff00;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 1001;
        }

        body.light-mode {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            color: #1f2937;
        }

        body.light-mode .card {
            background: white;
            border-color: #667eea;
        }

        body.light-mode .stat-card {
            background: white;
            border-color: #667eea;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #00ff00, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(26, 26, 46, 0.8);
            border: 1px solid #00ff00;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(26, 26, 46, 0.9);
            border: 1px solid #00ff00;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 255, 0, 0.2);
        }

        .card-header {
            background: linear-gradient(135deg, rgba(0, 255, 0, 0.1), rgba(0, 200, 255, 0.1));
            padding: 15px 20px;
            font-weight: bold;
        }

        .card-body {
            padding: 25px;
            text-align: center;
        }

        .value {
            font-size: 3rem;
            font-weight: bold;
            margin: 15px 0;
        }

        .trend-up { color: #00ff00; }
        .trend-down { color: #ff4444; }

        /* Alert banner */
        .alert-banner {
            background: rgba(255, 68, 68, 0.2);
            border-left: 4px solid #ff4444;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            display: none;
        }

        .alert-banner.show {
            display: block;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Refresh button */
        .refresh-btn {
            background: linear-gradient(135deg, #00ff00, #00ccff);
            color: #0a0a0a;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px auto;
            display: block;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 0.8rem;
            border-top: 1px solid rgba(0, 255, 0, 0.2);
        }

        @media (max-width: 768px) {
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
            .dashboard-grid { grid-template-columns: 1fr; }
            .value { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <button class="menu-btn" onclick="toggleSidebar()">☰ Menu</button>
    <div class="theme-toggle" onclick="toggleTheme()">🌓</div>

    <div class="sidebar" id="sidebar">
        <h3>📊 Navigation</h3>
        <a href="index.html">🏠 Dashboard</a>
        <a href="demo.html">🎮 Live Demo</a>
        <a href="examples.html">📚 Examples</a>
        <a href="https://github.com/dwight-trujillo/dynamic-values-system">💻 GitHub</a>
        <hr style="border-color:#333; margin:15px 0;">
        <h3>📈 Quick Stats</h3>
        <div id="sidebar-stats"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>🚀 Dynamic Values System Pro</h1>
            <div class="status-badge" style="margin-top:10px;">
                <span class="live-indicator"></span> LIVE | <span id="api-status">Connected</span>
            </div>
        </div>

        <div class="alert-banner" id="alert-banner">
            ⚠️ <span id="alert-message"></span>
        </div>

        <div class="stats-bar" id="stats-bar"></div>
        <div class="dashboard-grid" id="dashboard-grid"></div>
        <button class="refresh-btn" onclick="refreshAllData()">🔄 Refresh All Data</button>
        <div class="footer">
            <p>⚡ Real-time updates every 2 seconds | 🔒 Military-grade security</p>
            <p>📡 Last update: <span id="last-update">--</span></p>
        </div>
    </div>

    <script>
        let updateInterval;
        let previousData = {};

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        function generateData() {
            return {
                random: Math.floor(Math.random() * 100) + 1,
                temperature: (15 + Math.random() * 20).toFixed(1),
                humidity: Math.floor(30 + Math.random() * 60),
                cpu: Math.floor(20 + Math.random() * 60),
                users: Math.floor(500 + Math.random() * 500),
                rps: Math.floor(100 + Math.random() * 400),
                cache_hit: (85 + Math.random() * 14).toFixed(1)
            };
        }

        function getTrend(oldVal, newVal) {
            if (!oldVal) return { text: '➡️ 0%', class: 'trend-stable' };
            const change = ((newVal - oldVal) / oldVal * 100).toFixed(1);
            if (change > 0) return { text: `📈 +${change}%`, class: 'trend-up' };
            if (change < 0) return { text: `📉 ${change}%`, class: 'trend-down' };
            return { text: '➡️ 0%', class: 'trend-stable' };
        }

        function checkAlerts(data) {
            if (data.cpu > 85) {
                document.getElementById('alert-message').textContent = `High CPU usage: ${data.cpu}%`;
                document.getElementById('alert-banner').classList.add('show');
                setTimeout(() => document.getElementById('alert-banner').classList.remove('show'), 5000);
            }
        }

        function updateUI() {
            const data = generateData();
            
            // Stats bar
            document.getElementById('stats-bar').innerHTML = `
                <div class="stat-card"><div class="label">Uptime</div><div class="value">99.99%</div></div>
                <div class="stat-card"><div class="label">Cache Hit</div><div class="value">${data.cache_hit}%</div></div>
                <div class="stat-card"><div class="label">Active Users</div><div class="value">${data.users.toLocaleString()}</div></div>
                <div class="stat-card"><div class="label">RPS</div><div class="value">${data.rps.toLocaleString()}</div></div>
            `;

            // Dashboard grid
            document.getElementById('dashboard-grid').innerHTML = `
                <div class="card"><div class="card-header">🎲 Random</div><div class="card-body"><div class="value">${data.random}</div></div></div>
                <div class="card"><div class="card-header">🌡️ Temperature</div><div class="card-body"><div class="value">${data.temperature}°C</div></div></div>
                <div class="card"><div class="card-header">💧 Humidity</div><div class="card-body"><div class="value">${data.humidity}%</div></div></div>
                <div class="card"><div class="card-header">⚙️ CPU</div><div class="card-body"><div class="value">${data.cpu}%</div></div></div>
            `;

            // Sidebar stats
            document.getElementById('sidebar-stats').innerHTML = `
                <div style="margin:10px 0">🎲 Random: ${data.random}</div>
                <div style="margin:10px 0">🌡️ Temp: ${data.temperature}°C</div>
                <div style="margin:10px 0">💧 Humidity: ${data.humidity}%</div>
                <div style="margin:10px 0">⚙️ CPU: ${data.cpu}%</div>
            `;

            document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
            checkAlerts(data);
            previousData = data;
        }

        function refreshAllData() {
            updateUI();
        }

        updateUI();
        updateInterval = setInterval(updateUI, 2000);
    </script>
</body>
</html>
