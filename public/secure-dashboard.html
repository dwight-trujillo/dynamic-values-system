<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Values - Secure Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            background: rgba(26, 26, 46, 0.95);
            border: 2px solid #00ff00;
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            text-align: center;
        }
        
        .login-container h1 {
            color: #00ff00;
            margin-bottom: 30px;
        }
        
        .input-group {
            margin: 20px 0;
            text-align: left;
        }
        
        .input-group label {
            color: #00ff00;
            display: block;
            margin-bottom: 5px;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00ff00;
            border-radius: 8px;
            color: #00ff00;
            font-size: 1rem;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #00ff00;
            color: #0a0a0a;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .error {
            color: #ff4444;
            margin-top: 15px;
            display: none;
        }
        
        .dashboard-container {
            display: none;
            width: 100%;
            padding: 20px;
        }
        
        .logout-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ff4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: auto;
        }
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 80px 20px 30px;
        }
        
        .stat-card {
            background: rgba(26, 26, 46, 0.8);
            border: 1px solid #00ff00;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 20px;
        }
        
        .card {
            background: rgba(26, 26, 46, 0.9);
            border: 1px solid #00ff00;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
        }
        
        .card .value {
            font-size: 3rem;
            font-weight: bold;
            margin: 15px 0;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        @media (max-width: 768px) {
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-container">
        <h1>🔐 Secure Access</h1>
        <form onsubmit="authenticate(event)">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="admin" autocomplete="off">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••">
            </div>
            <button type="submit">Login</button>
            <div id="loginError" class="error">Invalid credentials</div>
        </form>
        <div style="margin-top:20px; font-size:0.7rem; color:#666;">Demo: admin / admin123</div>
    </div>

    <div id="dashboard" class="dashboard-container">
        <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        
        <div class="stats-bar">
            <div class="stat-card"><div class="label">Uptime</div><div class="value" id="uptime">99.99%</div></div>
            <div class="stat-card"><div class="label">Cache Hit</div><div class="value" id="cache-hit">94%</div></div>
            <div class="stat-card"><div class="label">Active Users</div><div class="value" id="active-users">--</div></div>
            <div class="stat-card"><div class="label">RPS</div><div class="value" id="rps">--</div></div>
        </div>

        <div class="dashboard-grid" id="dashboard-grid"></div>
        
        <div class="footer">
            <p>🔒 Secure Session | Role: <span id="user-role">Admin</span></p>
            <p>📡 Last update: <span id="last-update">--</span></p>
        </div>
    </div>

    <script>
        const VALID_CREDENTIALS = {
            admin: 'admin123',
            user: 'user123',
            monitor: 'monitor123'
        };

        let currentUser = null;
        let updateInterval;

        function authenticate(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (VALID_CREDENTIALS[username] === password) {
                currentUser = username;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('user-role').textContent = username === 'admin' ? 'Administrator' : (username === 'monitor' ? 'Monitor' : 'User');
                startDashboard();
            } else {
                document.getElementById('loginError').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('loginError').style.display = 'none';
                }, 3000);
            }
        }

        function logout() {
            currentUser = null;
            if (updateInterval) clearInterval(updateInterval);
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        function generateData() {
            return {
                random: Math.floor(Math.random() * 100) + 1,
                temperature: (15 + Math.random() * 20).toFixed(1),
                humidity: Math.floor(30 + Math.random() * 60),
                users: Math.floor(500 + Math.random() * 500),
                rps: Math.floor(100 + Math.random() * 400)
            };
        }

        function updateDashboard() {
            const data = generateData();
            document.getElementById('active-users').textContent = data.users.toLocaleString();
            document.getElementById('rps').textContent = data.rps.toLocaleString();
            document.getElementById('dashboard-grid').innerHTML = `
                <div class="card"><div>🎲 Random</div><div class="value">${data.random}</div></div>
                <div class="card"><div>🌡️ Temperature</div><div class="value">${data.temperature}°C</div></div>
                <div class="card"><div>💧 Humidity</div><div class="value">${data.humidity}%</div></div>
            `;
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
        }

        function startDashboard() {
            updateDashboard();
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(updateDashboard, 3000);
        }
    </script>
</body>
</html>
